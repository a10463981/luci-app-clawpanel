name: Build ipk

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: false
        type: string

env:
  IPK_VERSION: ${{ github.event.inputs.version || github.event.release.tag_name || '1.2.0' }}

jobs:
  build-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/22.03.3/targets/armvirt/64/openwrt-sdk-22.03.3-armvirt-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-aarch64.tar.xz
          tar xf /tmp/sdk-aarch64.tar.xz -C /opt/sdk

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}/." "$SDK_DIR/package/luci-app-clawpanel/"
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          ./scripts/feeds update -a 2>&1 | tail -3
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT
          echo "Found: $IPK"

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-aarch64
          path: ${{ steps.find.outputs.ipk }}

  build-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/22.03.3/targets/x86/64/openwrt-sdk-22.03.3-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-x86_64.tar.xz
          tar xf /tmp/sdk-x86_64.tar.xz -C /opt/sdk

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}/." "$SDK_DIR/package/luci-app-clawpanel/"
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          ./scripts/feeds update -a 2>&1 | tail -3
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-x86_64
          path: ${{ steps.find.outputs.ipk }}

  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/22.03.3/targets/armvirt/32/openwrt-sdk-22.03.3-armvirt-32_gcc-11.2.0_musl_eabi.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-armv7.tar.xz
          tar xf /tmp/sdk-armv7.tar.xz -C /opt/sdk

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}/." "$SDK_DIR/package/luci-app-clawpanel/"
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          ./scripts/feeds update -a 2>&1 | tail -3
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-armv7
          path: ${{ steps.find.outputs.ipk }}

  build-armv6:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3

      - name: Download SDK (armvirt/32)
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/22.03.3/targets/armvirt/32/openwrt-sdk-22.03.3-armvirt-32_gcc-11.2.0_musl_eabi.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-armv6.tar.xz
          tar xf /tmp/sdk-armv6.tar.xz -C /opt/sdk

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}/." "$SDK_DIR/package/luci-app-clawpanel/"
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          ./scripts/feeds update -a 2>&1 | tail -3
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-armv6
          path: ${{ steps.find.outputs.ipk }}

  release:
    needs: [build-aarch64, build-x86_64, build-armv7, build-armv6]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts (separate dirs)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "luci-app-clawpanel-*"
          merge-multiple: false

      - name: Rename and list
        run: |
          cd artifacts
          echo "=== Artifact directories ==="
          ls -la
          echo ""
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release tag: $TAG"
          echo ""
          echo "=== IPK files found ==="
          find . -name "*.ipk" -type f | while read f; do
            echo "  $f ($(du -h "$f" | cut -f1))"
          done
          echo ""
          echo "=== Renaming to standard names ==="
          # Map each artifact dir's IPK to standard arch name
          declare -A ARCH_MAP=(
            ["luci-app-clawpanel-aarch64"]="aarch64"
            ["luci-app-clawpanel-x86_64"]="x86_64"
            ["luci-app-clawpanel-armv7"]="armv7"
            ["luci-app-clawpanel-armv6"]="armv6"
          )
          for dir in luci-app-clawpanel-*; do
            [ -d "$dir" ] || continue
            arch="${ARCH_MAP[$dir]}"
            ipk=$(find "$dir" -name "*.ipk" -type f | head -1)
            if [ -n "$ipk" ] && [ -n "$arch" ]; then
              newname="luci-app-clawpanel_${TAG}_${arch}.ipk"
              mv "$ipk" "$dir/$newname"
              echo "  $dir -> $newname"
            fi
          done
          echo ""
          echo "=== Final files to upload ==="
          find . -name "*.ipk" -type f

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Uploading to release: $TAG"
          echo ""
          # Upload all IPK files from all subdirectories
          find . -name "luci-app-clawpanel_${TAG}_*.ipk" -type f | while read f; do
            echo "  Uploading: $f"
            gh release upload "$TAG" "$f" --clobber && echo "  ✓ Uploaded: $(basename $f)"
          done
          echo ""
          echo "=== Verifying release assets ==="
          gh release view "$TAG" --json=assets --jq '.assets[].name'
