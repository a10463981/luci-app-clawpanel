name: Build ipk

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (aarch64/x86_64/armv7)'
        required: false
        default: 'all'

env:
  SDK_VERSION: "23.05.5"

jobs:
  build-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/${{ env.SDK_VERSION }}/targets/armvirt/64/openwrt-sdk-${{ env.SDK_VERSION }}-armvirt-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk.tar.xz 2>&1 | tail -3
          tar xf /tmp/sdk.tar.xz -C /opt/sdk 2>&1 | tail -3
          ls /opt/sdk/

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}" "$SDK_DIR/package/luci-app-clawpanel"
          cd "$SDK_DIR"
          ./scripts/feeds update -a 2>&1 | tail -5
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK"
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-aarch64
          path: ${{ steps.find.outputs.ipk }}

  build-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/${{ env.SDK_VERSION }}/targets/x86/64/openwrt-sdk-${{ env.SDK_VERSION }}-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk.tar.xz 2>&1 | tail -3
          tar xf /tmp/sdk.tar.xz -C /opt/sdk 2>&1 | tail -3

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}" "$SDK_DIR/package/luci-app-clawpanel"
          cd "$SDK_DIR"
          ./scripts/feeds update -a 2>&1 | tail -5
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-x86_64
          path: ${{ steps.find.outputs.ipk }}

  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file 2>&1 | tail -3

      - name: Download SDK
        run: |
          mkdir -p /opt/sdk
          wget -q "https://downloads.openwrt.org/releases/${{ env.SDK_VERSION }}/targets/armvirt/32/openwrt-sdk-${{ env.SDK_VERSION }}-armvirt-32_gcc-11.2.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk.tar.xz 2>&1 | tail -3
          tar xf /tmp/sdk.tar.xz -C /opt/sdk 2>&1 | tail -3

      - name: Prepare
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cp -r "${{ github.workspace }}" "$SDK_DIR/package/luci-app-clawpanel"
          cd "$SDK_DIR"
          ./scripts/feeds update -a 2>&1 | tail -5
          ./scripts/feeds install -a -p luci 2>&1 | tail -5

      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          cd "$SDK_DIR"
          make package/luci-app-clawpanel/compile V=s 2>&1 | tail -40

      - name: Find artifact
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-clawpanel_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk=$IPK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.find.outputs.ipk != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clawpanel-armv7
          path: ${{ steps.find.outputs.ipk }}

  release:
    needs: [build-aarch64, build-x86_64, build-armv7]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List
        run: |
          ls -lh artifacts/
          find artifacts/ -name "*.ipk" -type f

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          find artifacts/ -name "*.ipk" -type f | while read f; do
            echo "Uploading: $f -> $TAG"
            gh release upload "$TAG" "$f" --clobber 2>&1
          done
