<%#
 luci-app-clawpanel — 运行状态面板
-%>

<style type="text/css">
#cp-status-panel {
	margin: 0 0 20px 0;
	padding: 0;
	border: 1px solid #e0e0e0;
	border-radius: 8px;
	background: #fff;
	overflow: hidden;
	box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#cp-status-panel .panel-title {
	background: linear-gradient(135deg, #4a90d9, #357abd);
	color: #fff;
	padding: 10px 16px;
	font-size: 14px;
	font-weight: 600;
	letter-spacing: 0.5px;
}
#cp-status-panel .panel-body {
	padding: 0;
}
#cp-status-panel table {
	width: 100%;
	border-collapse: collapse;
}
#cp-status-panel td {
	padding: 8px 16px;
	border-bottom: 1px solid #f2f2f2;
	font-size: 13px;
	vertical-align: middle;
}
#cp-status-panel tr:last-child td {
	border-bottom: none;
}
#cp-status-panel td:first-child {
	width: 120px;
	color: #888;
	font-weight: 500;
	white-space: nowrap;
}
#cp-status-panel td:last-child {
	color: #333;
}
.cp-badge {
	display: inline-block;
	padding: 2px 12px;
	border-radius: 12px;
	font-size: 12px;
	font-weight: 600;
}
.cp-badge-running { background: #e6f7e9; color: #1a7f37; }
.cp-badge-stopped { background: #ffeef0; color: #cf222e; }
.cp-badge-starting { background: #fff8c5; color: #9a6700; }
.cp-badge-disabled { background: #f0f0f0; color: #656d76; }
.cp-badge-unknown { background: #fff8c5; color: #9a6700; }
.cp-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.cp-dot-green { background: #1a7f37; }
.cp-dot-red { background: #cf222e; }
.cp-dot-gray { background: #999; }
</style>

<div id="cp-status-panel">
	<div class="panel-title" id="cp-panel-title">🐙 ClawPanel 服务状态</div>
	<div class="panel-body">
		<table>
			<tr><td>运行状态</td><td id="cp-st-status"><span class="cp-badge cp-badge-unknown">加载中...</span></td></tr>
			<tr><td>面板服务</td><td id="cp-st-panel">-</td></tr>
			<tr><td>进程 PID</td><td id="cp-st-pid">-</td></tr>
			<tr><td>内存占用</td><td id="cp-st-mem">-</td></tr>
			<tr><td>运行时间</td><td id="cp-st-uptime">-</td></tr>
			<tr><td>ClawPanel</td><td id="cp-st-panel-ver">-</td></tr>
			<tr><td>OpenClaw</td><td id="cp-st-oc-ver">-</td></tr>
			<tr><td>版本形态</td><td id="cp-st-edition">-</td></tr>
			<tr><td>监听端口</td><td id="cp-st-port">-</td></tr>
			<tr><td>安装路径</td><td id="cp-st-path">-</td></tr>
			<tr><td>剩余空间</td><td id="cp-st-disk">-</td></tr>
		</table>
	</div>
</div>

<script type="text/javascript">
//<![CDATA[
(function() {
	var statusUrl = '<%=luci.dispatcher.build_url("admin", "services", "clawpanel", "status_api")%>';

	function updateStatus() {
		(new XHR()).get(statusUrl, null, function(x) {
			try {
				var d = JSON.parse(x.responseText);

				var stEl = document.getElementById('cp-st-status');
				if (d.enabled !== '1') {
					stEl.innerHTML = '<span class="cp-badge cp-badge-disabled">已禁用</span>';
				} else if (d.panel_running) {
					stEl.innerHTML = '<span class="cp-badge cp-badge-running">运行中</span>';
				} else if (d.panel_starting) {
					stEl.innerHTML = '<span class="cp-badge cp-badge-starting">⏳ 正在启动...</span>';
				} else {
					stEl.innerHTML = '<span class="cp-badge cp-badge-stopped">已停止</span>';
				}

				var panelEl = document.getElementById('cp-st-panel');
				if (d.panel_running) {
					panelEl.innerHTML = '<span class="cp-dot cp-dot-green"></span>监听中 :' + d.port;
				} else if (d.panel_starting) {
					panelEl.innerHTML = '<span class="cp-dot cp-dot-gray"></span>初始化中...';
				} else {
					panelEl.innerHTML = '<span class="cp-dot cp-dot-red"></span>未监听';
				}

				document.getElementById('cp-st-pid').textContent = d.pid || '-';

				var memEl = document.getElementById('cp-st-mem');
				if (d.memory_kb > 0) {
					var mb = (d.memory_kb / 1024).toFixed(1);
					memEl.textContent = mb + ' MB';
				} else {
					memEl.textContent = '-';
				}

				document.getElementById('cp-st-uptime').textContent = d.uptime || '-';
				document.getElementById('cp-st-panel-ver').textContent = d.panel_version || '未安装';
				document.getElementById('cp-st-oc-ver').textContent = d.openclaw_version || '-';
				document.getElementById('cp-st-edition').textContent = (d.edition === 'lite' ? 'Lite (内置 OpenClaw)' : 'Pro (外部 OpenClaw)');
				document.getElementById('cp-st-port').textContent = d.port || '19527';

				var pathEl = document.getElementById('cp-st-path');
				if (d.install_path) {
					pathEl.innerHTML = '<code style="padding:2px 8px;background:#f0f3f6;border-radius:4px;font-size:12px;">' + d.install_path + '</code>';
				} else {
					pathEl.textContent = '-';
				}

				var diskEl = document.getElementById('cp-st-disk');
				if (d.disk_free) {
					diskEl.innerHTML = '<span style="color:#1a7f37;font-weight:500;">' + d.disk_free + ' 可用</span>';
				} else {
					diskEl.textContent = '-';
				}

			} catch(e) {
				document.getElementById('cp-st-status').innerHTML = '<span class="cp-badge cp-badge-unknown">查询失败</span>';
			}
		});
	}

	updateStatus();
	setInterval(updateStatus, 5000);
})();
//]]>
</script>
