<%#
main.htm - ClawPanel 主页
-%>
<%+header%>

<style>
#cp-panel{margin:0 0 20px 0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#cp-panel .panel-title{background:linear-gradient(135deg,#4a90d9,#357abd);color:#fff;padding:10px 16px;font-size:14px;font-weight:600}
#cp-panel table{width:100%;border-collapse:collapse}
#cp-panel td{padding:8px 16px;border-bottom:1px solid #f2f2f2;font-size:13px;vertical-align:middle}
#cp-panel tr:last-child td{border-bottom:none}
#cp-panel td:first-child{width:120px;color:#888;font-weight:500;white-space:nowrap}
.cp-btn{padding:6px 14px;border-radius:6px;font-size:13px;color:#fff;border:none;cursor:pointer;display:inline-block;text-decoration:none}
.cp-btn-apply{background:#4a90d9}.cp-btn-action{background:#6c757d}.cp-btn-remove{background:#cf222e}.cp-btn-web{background:#1a7f37}
.cp-btn:hover{opacity:0.85}
.cp-badge{display:inline-block;padding:2px 12px;border-radius:12px;font-size:12px;font-weight:600}
.cp-badge-running{background:#e6f7e9;color:#1a7f37}
.cp-badge-stopped{background:#ffeef0;color:#cf222e}
.cp-badge-starting{background:#fff8c5;color:#9a6700}
.cp-badge-disabled{background:#f0f0f0;color:#656d76}
.cp-badge-unknown{background:#fff8c5;color:#9a6700}
#cp-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center}
#cp-modal.show{display:flex}
#cp-modal .modal-box{background:#fff;border-radius:12px;padding:24px;max-width:440px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3);max-height:85vh;overflow-y:auto}
.cp-path{margin-bottom:14px;display:flex;align-items:center;gap:10px}
.cp-path label{font-size:13px;color:#555}
.cp-path input{flex:1;max-width:260px;padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px}
</style>

<div id="cp-panel">
<div class="panel-title" id="cp-title">🦎 ClawPanel 服务状态</div>
<table>
<tr><td>运行状态</td><td id="cp-st-status"><span class="cp-badge cp-badge-unknown">加载中...</span></td></tr>
<tr><td>面板端口</td><td id="cp-st-port">-</td></tr>
<tr><td>进程 PID</td><td id="cp-st-pid">-</td></tr>
<tr><td>内存占用</td><td id="cp-st-mem">-</td></tr>
<tr><td>运行时间</td><td id="cp-st-uptime">-</td></tr>
<tr><td>版本</td><td id="cp-st-ver">-</td></tr>
<tr><td>安装路径</td><td id="cp-st-path">-</td></tr>
<tr><td>剩余空间</td><td id="cp-st-disk">-</td></tr>
</table>
</div>

<div class="cp-path">
<label>安装路径:</label>
<input type="text" id="f-path" value="<%=install_path%>" placeholder="/mnt/sda1">
</div>

<div style="margin-bottom:14px">
<button class="cp-btn cp-btn-apply" onclick="doInstall()">安装/重装</button>
<button class="cp-btn cp-btn-action" onclick="doSvc('restart')">重启</button>
<button class="cp-btn cp-btn-action" onclick="doSvc('stop')">停止</button>
<button class="cp-btn cp-btn-action" onclick="doSvc('start')">启动</button>
<button class="cp-btn cp-btn-remove" onclick="doUninstall()">卸载</button>
<a href="http://192.168.1.1:<%=port%>" target="_blank" class="cp-btn cp-btn-web">访问 ClawPanel</a>
<button class="cp-btn cp-btn-action" onclick="updateStatus()" style="float:right">刷新状态</button>
</div>

<div style="border:1px solid #d0e8ff;background:#f0f7ff;padding:14px 18px;border-radius:6px;font-size:13px;line-height:1.8">
<strong>使用指南</strong><br/>
完成后访问 <a href="http://192.168.1.1:<%=port%>" target="_blank" style="color:#4a90d9">http://192.168.1.1:<%=port%></a><br/>
<strong style="color:#cf222e">必须安装到外置存储（/mnt/sda1 等），禁止系统分区</strong>
</div>

<div id="cp-modal">
<div class="modal-box">
<h3 id="cp-modal-title" style="margin:0 0 14px 0">提示</h3>
<p id="cp-modal-msg" style="font-size:13px;line-height:1.7;color:#333"></p>
<div style="text-align:right;margin-top:16px">
<button class="cp-btn cp-btn-action" onclick="closeModal()">确定</button>
</div>
</div>
</div>

<script type="text/javascript">
//<![CDATA[
var BASE = '<%=luci.dispatcher.build_url("admin", "services", "clawpanel")%>';
var installPathEl = document.getElementById('f-path');

function updateStatus() {
    var x = new XHR();
    x.get(BASE + '/status_api', null, function(xhr) {
        try {
            var d = JSON.parse(xhr.responseText);
            var stEl = document.getElementById('cp-st-status');
            if (d.enabled !== '1') {
                stEl.innerHTML = '<span class="cp-badge cp-badge-disabled">未安装</span>';
            } else if (d.panel_running) {
                stEl.innerHTML = '<span class="cp-badge cp-badge-running">运行中</span>';
            } else if (d.enabled === '1') {
                stEl.innerHTML = '<span class="cp-badge cp-badge-stopped">已停止</span>';
            } else {
                stEl.innerHTML = '<span class="cp-badge cp-badge-unknown">未知</span>';
            }
            document.getElementById('cp-st-port').textContent = d.port || '<%=port%>';
            document.getElementById('cp-st-pid').textContent = d.pid || '-';
            if (d.memory_kb > 0) {
                document.getElementById('cp-st-mem').textContent = (d.memory_kb / 1024).toFixed(1) + ' MB';
            } else {
                document.getElementById('cp-st-mem').textContent = '-';
            }
            document.getElementById('cp-st-uptime').textContent = d.uptime || '-';
            document.getElementById('cp-st-ver').textContent = d.panel_version || d.installed_version || '-';
            document.getElementById('cp-st-path').textContent = d.install_path || '<%=install_path%>';
            document.getElementById('cp-st-disk').textContent = d.disk_free || '-';
        } catch(e) {
            document.getElementById('cp-st-status').innerHTML = '<span class="cp-badge cp-badge-unknown">查询失败</span>';
        }
    });
}

function showModal(title, msg) {
    document.getElementById('cp-modal-title').textContent = title;
    document.getElementById('cp-modal-msg').textContent = msg;
    document.getElementById('cp-modal').classList.add('show');
}
function closeModal() {
    document.getElementById('cp-modal').classList.remove('show');
}

function doInstall() {
    var path = installPathEl.value.trim();
    if (!path) { alert('请输入安装路径'); return; }
    var d = ['/overlay','/rom','/boot','/proc','/sys','/dev','/opt','/tmp','/var','/etc','/root','/usr','/bin','/sbin','/lib','/'];
    for (var i = 0; i < d.length; i++) {
        if (path === d[i] || path.indexOf(d[i] + '/') === 0) {
            alert('禁止安装到系统分区！请输入外置存储路径');
            return;
        }
    }
    var form = document.createElement('form');
    form.method = 'GET';
    form.action = BASE + '/service_ctl';
    var a = document.createElement('input'); a.type = 'hidden'; a.name = 'action'; a.value = 'setup'; form.appendChild(a);
    var p = document.createElement('input'); p.type = 'hidden'; p.name = 'install_path'; p.value = path; form.appendChild(p);
    document.body.appendChild(form);
    form.submit();
}

function doUninstall() {
    if (!confirm('确定要卸载 ClawPanel 吗？\n所有数据将被永久删除！')) return;
    var form = document.createElement('form');
    form.method = 'GET';
    form.action = BASE + '/uninstall';
    document.body.appendChild(form);
    form.submit();
}

function doSvc(action) {
    var form = document.createElement('form');
    form.method = 'GET';
    form.action = BASE + '/service_ctl';
    var a = document.createElement('input'); a.type = 'hidden'; a.name = 'action'; a.value = action; form.appendChild(a);
    document.body.appendChild(form);
    form.submit();
}

updateStatus();
setInterval(updateStatus, 5000);
//]]>
</script>

<%+footer%>
