<%#
basic.htm — ClawPanel 基本设置页面
所有 UI 在此模板中，LUA 只做数据准备
-%>

<style>
.cp-btn{display:inline-block;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;margin:2px;}
.cp-btn-apply{background:#4a90d9;color:#fff;}
.cp-btn-action{background:#6c757d;color:#fff;}
.cp-btn-remove{background:#cf222e;color:#fff;}
.cp-btn:hover{opacity:0.85;}
.cp-panel{border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:20px;}
.cp-panel-title{background:linear-gradient(135deg,#4a90d9,#357abd);color:#fff;padding:10px 16px;font-size:14px;font-weight:600;}
.cp-panel table{width:100%;border-collapse:collapse;}
.cp-panel td{padding:8px 16px;border-bottom:1px solid #f2f2f2;font-size:13px;}
.cp-panel tr:last-child td{border-bottom:none;}
.cp-panel td:first-child{width:120px;color:#888;white-space:nowrap;}
.cp-badge{display:inline-block;padding:2px 12px;border-radius:12px;font-size:12px;font-weight:600;}
.cp-badge-running{background:#e6f7e9;color:#1a7f37;}
.cp-badge-stopped{background:#ffeef0;color:#cf222e;}
.cp-badge-unknown{background:#fff8c5;color:#9a6700;}
.cp-badge-disabled{background:#f0f0f0;color:#656d76;}
</style>

<!-- 状态面板 -->
<div class="cp-panel">
<div class="cp-panel-title">🐙 ClawPanel 服务状态</div>
<table>
<tr><td>运行状态</td><td id="cp-st"><span class="cp-badge cp-badge-unknown">加载中...</span></td></tr>
<tr><td>面板服务</td><td id="cp-sv">-</td></tr>
<tr><td>进程 PID</td><td id="cp-pid">-</td></tr>
<tr><td>内存占用</td><td id="cp-mem">-</td></tr>
<tr><td>运行时间</td><td id="cp-up">-</td></tr>
<tr><td>版本</td><td id="cp-ver">-</td></tr>
<tr><td>安装路径</td><td id="cp-path">-</td></tr>
<tr><td>剩余空间</td><td id="cp-disk">-</td></tr>
</table>
</div>

<!-- 操作按钮 -->
<div style="margin-bottom:14px;">
<a href="/cgi-bin/luci/admin/services/clawpanel/install"><button class="cp-btn cp-btn-apply">📦 安装/重装</button></a>
<button class="cp-btn cp-btn-action" id="btn-restart">🔄 重启</button>
<button class="cp-btn cp-btn-action" id="btn-stop">⏹ 停止</button>
<button class="cp-btn cp-btn-action" id="btn-start">▶ 启动</button>
<button class="cp-btn cp-btn-action" id="btn-check">🔍 检测升级</button>
<a href="/cgi-bin/luci/admin/services/clawpanel/uninstall_page"><button class="cp-btn cp-btn-remove">🗑 卸载</button></a>
</div>

<div id="cp-result" style="margin-bottom:14px;font-size:13px;"></div>

<!-- 使用指南 -->
<div style="border:1px solid #d0e8ff;background:#f0f7ff;padding:14px 18px;border-radius:6px;line-height:1.8;font-size:13px;">
<strong>📖 使用指南</strong><br/>
<span style="color:#555">
首次使用：点击上方 <b>「安装/重装」</b> 按钮进入安装页面<br/>
安装完成后访问 <b>http://路由器IP:19527</b> 进入 ClawPanel 管理面板<br/>
⚠️ 必须选择外置存储（USB/SATA 挂载点），禁止安装到系统分区
</span>
</div>

<script>
var BASE = '<%=luci.dispatcher.build_url("admin", "services", "clawpanel")%>';

// 注意：iStoreOS LuCI 已废弃 new XHR()，改用 L.Request
function svc(action) {
	var el = document.getElementById('cp-result');
	el.innerHTML = '<span style="color:#999">⏳ 正在执行...</span>';
	L.Request.get('<%=luci.dispatcher.build_url("admin", "services", "clawpanel")%>/service_ctl?action=' + action, {
		callback: function(x) {
			try {
				var r = JSON.parse(x.responseText);
				el.innerHTML = r.status == 'ok'
					? '<span style="color:green">✅ ' + action + ' 已提交，页面将刷新...</span>'
					: '<span style="color:red">❌ ' + (r.message || '失败') + '</span>';
			} catch(e) {
				el.innerHTML = '<span style="color:red">❌ 请求失败</span>';
			}
		}
	});
	setTimeout(function() { location.reload(); }, 2500);
}

document.getElementById('btn-restart').onclick = function() { svc('restart'); };
document.getElementById('btn-stop').onclick = function() { svc('stop'); };
document.getElementById('btn-start').onclick = function() { svc('start'); };

document.getElementById('btn-check').onclick = function() {
	var el = document.getElementById('cp-result');
	el.innerHTML = '<span style="color:#999">⏳ 检测中...</span>';
	L.Request.get('<%=luci.dispatcher.build_url("admin", "services", "clawpanel")%>/check_update', {
		callback: function(x) {
			try {
				var r = JSON.parse(x.responseText);
				if (r.plugin_has_update) {
					el.innerHTML = '<span style="color:#e36209">🔌 v' + r.plugin_current + ' → v' + r.plugin_latest + ' (有新版本)</span>';
				} else if (r.plugin_current) {
					el.innerHTML = '<span style="color:#1a7f37">✅ 已是最快版本: v' + r.plugin_current + '</span>';
				} else {
					el.innerHTML = '<span style="color:#888">无法获取版本</span>';
				}
			} catch(e) {
				el.innerHTML = '<span style="color:red">检测失败</span>';
			}
		}
	});
};

(function() {
	function load() {
		L.Request.get('<%=luci.dispatcher.build_url("admin", "services", "clawpanel")%>/status_api', {
			callback: function(x) {
				try {
					var d = JSON.parse(x.responseText);
					var st = document.getElementById('cp-st');
					if (d.enabled !== '1') {
						st.innerHTML = '<span class="cp-badge cp-badge-disabled">已禁用</span>';
					} else if (d.panel_running) {
						st.innerHTML = '<span class="cp-badge cp-badge-running">运行中</span>';
					} else if (d.panel_starting) {
						st.innerHTML = '<span class="cp-badge cp-badge-unknown">⏳ 启动中...</span>';
					} else {
						st.innerHTML = '<span class="cp-badge cp-badge-stopped">已停止</span>';
					}
					document.getElementById('cp-sv').textContent = d.panel_running
						? ('监听 :' + d.port)
						: (d.panel_starting ? '初始化中...' : '未监听');
					document.getElementById('cp-pid').textContent = d.pid || '-';
					document.getElementById('cp-mem').textContent = d.memory_kb > 0
						? (d.memory_kb / 1024).toFixed(1) + ' MB' : '-';
					document.getElementById('cp-up').textContent = d.uptime || '-';
					document.getElementById('cp-ver').textContent = d.panel_version || '未安装';
					document.getElementById('cp-path').textContent = d.install_path || '-';
					document.getElementById('cp-disk').textContent = d.disk_free
						? (d.disk_free + ' 可用') : '-';
				} catch(e) {
					document.getElementById('cp-st').innerHTML = '<span class="cp-badge cp-badge-unknown">查询失败</span>';
				}
			}
		});
	}
	load();
	setInterval(load, 5000);
})();
</script>
